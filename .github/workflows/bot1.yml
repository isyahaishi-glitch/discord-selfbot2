        run: python tesa.py '{"place":"KMWQ","channel_idbg":1480115319698886750,"channel_idsign":1480115319698886750,"channel_idplat":1480115319698886750,"channel_idconsumable":1480115319698886750,"channel_idblock":1480115319698886750,"channel_idguild":1480115319698886750,"channel_iddoor":1480115319698886750,"channel_test":1480115319698886750,"channel_cooktools":1480115319698886750,"channel_winterfest":1480115319698886750,"channel_ubiweek":1480115319698886750,"channel_carni":1480115319698886750,"channel_valentine":1480115319698886750}'